<svg width="920" height="300" viewBox="0 0 920 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">ShinkaLabs Skills review pipeline</title>
  <desc id="desc">Animated review pipeline showing code entering audit skills and becoming an audit report with findings and fixes.</desc>

  <style>
    :root {
      --bg: #0b1020;
      --panel: #111827;
      --panel-soft: #172033;
      --stroke: #26344d;
      --line: #334155;
      --text: #f8fafc;
      --muted: #9db1cc;
      --blue: #38bdf8;
      --green: #22c55e;
      --purple: #a78bfa;
      --orange: #fb923c;
      --red: #f87171;
    }

    .card {
      fill: var(--panel);
      stroke: var(--stroke);
      stroke-width: 1.25;
    }

    .chip {
      fill: var(--panel-soft);
      stroke: #35445f;
      stroke-width: 1;
    }

    .title {
      fill: var(--text);
      font: 700 17px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .label {
      fill: var(--muted);
      font: 500 12px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .line {
      stroke-linecap: round;
      stroke-width: 5;
    }

    .rail {
      stroke: var(--line);
      stroke-width: 3;
      stroke-linecap: round;
    }

    .scan {
      animation: scan 2.5s ease-in-out infinite;
    }

    .check {
      stroke-dasharray: 42;
      stroke-dashoffset: 42;
      animation: check 2.7s ease-in-out infinite;
    }

    .glow {
      animation: glow 2.7s ease-in-out infinite;
    }

    @keyframes scan {
      0%, 100% { transform: translateY(-10px); opacity: .35; }
      50% { transform: translateY(36px); opacity: 1; }
    }

    @keyframes check {
      0%, 30% { stroke-dashoffset: 42; opacity: .35; }
      52%, 82% { stroke-dashoffset: 0; opacity: 1; }
      100% { stroke-dashoffset: 0; opacity: .45; }
    }

    @keyframes glow {
      0%, 100% { opacity: .72; filter: drop-shadow(0 0 0 rgba(34,197,94,0)); }
      50% { opacity: 1; filter: drop-shadow(0 0 12px rgba(34,197,94,.55)); }
    }

    @media (prefers-reduced-motion: reduce) {
      .scan, .check, .glow { animation: none; }
    }
  </style>

  <rect width="920" height="300" rx="28" fill="var(--bg)"/>
  <rect x="1" y="1" width="918" height="298" rx="27" stroke="#1f2a44"/>

  <g id="source" transform="translate(70 62)">
    <rect class="card" width="210" height="142" rx="14"/>
    <text class="title" x="24" y="32">Source Code</text>
    <text class="label" x="24" y="54">backend, frontend, contracts</text>
    <line class="line" x1="24" y1="82" x2="150" y2="82" stroke="var(--blue)"/>
    <line class="line" x1="24" y1="104" x2="170" y2="104" stroke="var(--purple)"/>
    <line class="line" x1="24" y1="126" x2="118" y2="126" stroke="var(--orange)"/>
  </g>

  <g id="skills" transform="translate(355 62)">
    <rect class="card" width="210" height="142" rx="14"/>
    <text class="title" x="24" y="32">Audit Skills</text>
    <text class="label" x="24" y="54">security + performance review</text>

    <rect class="chip" x="24" y="74" width="74" height="28" rx="8"/>
    <text class="label" x="49" y="93">Go</text>

    <rect class="chip" x="112" y="74" width="74" height="28" rx="8"/>
    <text class="label" x="135" y="93">Legal</text>

    <rect class="chip" x="24" y="110" width="74" height="28" rx="8"/>
    <text class="label" x="47" y="129">Rust</text>

    <rect class="chip" x="112" y="110" width="74" height="28" rx="8"/>
    <text class="label" x="141" y="129">TS</text>

    <rect class="scan" x="24" y="68" width="162" height="3" rx="1.5" fill="var(--blue)"/>
  </g>

  <g id="report" transform="translate(640 62)">
    <rect class="card" width="210" height="142" rx="14"/>
    <text class="title" x="24" y="32">Audit Report</text>
    <text class="label" x="24" y="54">findings + robust fixes</text>

    <circle cx="34" cy="86" r="7.5" fill="rgba(248,113,113,.18)" stroke="var(--red)"/>
    <line class="line" x1="56" y1="86" x2="168" y2="86" stroke="var(--red)"/>

    <path class="check" d="M26 118 L38 130 L58 106" stroke="var(--green)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <line class="line glow" x1="72" y1="118" x2="170" y2="118" stroke="var(--green)"/>
  </g>

  <path class="rail" d="M300 133 H335"/>
  <path class="rail" d="M585 133 H620"/>

  <circle r="6.5" fill="var(--blue)" filter="drop-shadow(0 0 8px #38bdf8)">
    <animate attributeName="cx" values="300;335;335;300" keyTimes="0;0.45;0.65;1" dur="2.8s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="133;133;133;133" dur="2.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values=".2;1;1;.2" keyTimes="0;0.2;0.75;1" dur="2.8s" repeatCount="indefinite"/>
  </circle>

  <circle r="6.5" fill="var(--purple)" filter="drop-shadow(0 0 8px #a78bfa)">
    <animate attributeName="cx" values="585;620;620;585" keyTimes="0;0.45;0.65;1" dur="2.8s" begin=".45s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="133;133;133;133" dur="2.8s" begin=".45s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values=".2;1;1;.2" keyTimes="0;0.2;0.75;1" dur="2.8s" begin=".45s" repeatCount="indefinite"/>
  </circle>

  <g id="legend" transform="translate(250 244)">
    <rect width="420" height="38" rx="19" fill="rgba(17,24,39,.82)" stroke="#26344d"/>
    <circle cx="28" cy="19" r="3.5" fill="var(--blue)"/>
    <text class="label" x="42" y="23">evidence</text>

    <circle cx="124" cy="19" r="3.5" fill="var(--orange)"/>
    <text class="label" x="138" y="23">severity</text>

    <circle cx="224" cy="19" r="3.5" fill="var(--green)"/>
    <text class="label" x="238" y="23">confidence</text>

    <circle cx="334" cy="19" r="3.5" fill="var(--purple)"/>
    <text class="label" x="348" y="23">fix plan</text>
  </g>
</svg>
